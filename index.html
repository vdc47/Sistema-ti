<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Sistema ATI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sistema ATI">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            
            /* UNIFICAÇÃO DO TOPO: Alterado para a cor escura exata do seu cabeçalho (#0f172a).
               Isso fará com que a área do relógio e da bateria se misture nativamente com o app */
            background-color: #0f172a; 
            
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
        }

        iframe {
            position: absolute;
            width: 100vw;
            border: none;
            
            /* Inicia logo após a barra de status do iPhone */
            top: env(safe-area-inset-top);
            
            /* CORREÇÃO DA ZONA MORTA: Removemos o desconto do safe-area-inset-bottom.
               Agora o iframe desce e preenche o espaço até o limite físico da tela */
            height: calc(100dvh - env(safe-area-inset-top));
            
            left: 0;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>
</body>
</html>
