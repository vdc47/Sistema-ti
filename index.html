<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>MeuOrc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MeuOrc">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        /* RESET E BLOQUEIO DO EFEITO ELÁSTICO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            
            /* Esta cor vai preencher a área do relógio e a faixa inferior (barrinha home) */
            background-color: #f8fafc; 
            
            overflow: hidden;
            overscroll-behavior: none; /* Mata o efeito elástico nativo */
            position: fixed; /* Trava o viewport, impedindo arraste da janela */
        }

        iframe {
            position: absolute;
            width: 100%;
            border: none;
            
            /* Começa exatamente abaixo da área do topo */
            top: env(safe-area-inset-top);
            
            /* Altura exata: 100dvh menos a safe area do topo e menos a safe area de baixo */
            height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            
            left: env(safe-area-inset-left);
            right: env(safe-area-inset-right);
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>
</body>
</html>
