    <style>
        body, html {
            margin: 0; padding: 0;
            position: fixed; top: 0; bottom: 0; left: 0; right: 0;
            width: 100%; height: 100%;
            background-color: #0f172a; /* Pinta a ilha dinâmica de azul escuro */
            overflow: hidden;
        }

        iframe {
            position: absolute;
            left: 0; right: 0; bottom: 0; /* Cola no chão físico do iPhone */
            top: env(safe-area-inset-top); /* Ignora apenas o espaço exato da câmera */
            width: 100%;
            border: none;
            background-color: #f8fafc; /* Fundo do sistema */
        }
    </style>
