<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Sistema ATI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sistema ATI">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        /* 1. TRAVA DO SISTEMA EM FLEXBOX */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; /* Trava na altura real da tela */
            background-color: #0f172a; /* Cor padrão escura */
            overflow: hidden;
            position: fixed;
            
            /* Ativa o Flexbox para empilhar os elementos */
            display: flex;
            flex-direction: column;
        }

        /* 2. ESPAÇADOR DA ILHA DINÂMICA */
        .notch-spacer {
            width: 100%;
            height: env(safe-area-inset-top); /* Pega exatamente o tamanho da câmera/relógio */
            background-color: #0f172a; /* Cor do seu cabeçalho */
            flex-shrink: 0; /* Impede que essa área seja esmagada */
        }

        /* 3. O SEU SISTEMA */
        iframe {
            width: 100%;
            flex-grow: 1; /* Manda o iframe crescer e preencher 100% do espaço que sobrou */
            border: none;
            background-color: #f8fafc; /* Fundo claro para o restante do app */
        }
    </style>
</head>
<body>
    
    <div class="notch-spacer"></div>
    
    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>

</body>
</html>
