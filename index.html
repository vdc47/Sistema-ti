<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Sistema ATI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sistema ATI">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        /* 1. TRAVA ABSOLUTA NO VIDRO DO CELULAR */
        body, html {
            margin: 0;
            padding: 0;
            
            /* Abandonamos o height 100dvh. Aqui cravamos as coordenadas nos limites da tela física */
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            
            /* Cor que vai preencher a área do relógio/bateria */
            background-color: #0f172a; 
            overflow: hidden;
        }

        /* 2. IFRAME PREGADO NO CHÃO */
        iframe {
            position: absolute;
            left: 0;
            right: 0;
            
            /* Cola o fundo do iframe no chão absoluto da tela, ignorando a barra do navegador */
            bottom: 0; 
            
            /* Empurra o topo apenas o suficiente para não esconder o seu menu atrás do relógio/câmera */
            top: env(safe-area-inset-top); 
            
            width: 100%;
            border: none;
            
            /* O fundo claro garante que o seu sistema mantenha a cor correta */
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    
    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>

</body>
</html>
