<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sistema ATI</title>

    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a; /* Cor de fundo para mesclar com o tema escuro */
            overflow: hidden;
        }

        iframe {
            position: absolute;
            width: 100%;
            border: none;
            
            /* Ajuste cirúrgico para a Ilha Dinâmica e altura real do dispositivo */
            height: 100dvh;
            top: max(54px, env(safe-area-inset-top));
            
            /* Puxa o iframe para cima para engolir a faixa do Apps Script */
            margin-top: -54px; 
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>

</body>
</html>
