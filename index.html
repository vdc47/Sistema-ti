<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Sistema ATI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sistema ATI">
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        /* 1. TRAVA DO SISTEMA E FUNDO CLARO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            
            /* Fundo geral da página claro. Resolve de vez a barra escura inferior */
            background-color: #f8fafc; 
            
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
        }

        /* 2. TRUQUE DO TOPO ESCURO */
        /* Cria uma faixa que ocupa EXATAMENTE a área do relógio e da Ilha Dinâmica */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: env(safe-area-inset-top);
            background-color: #0f172a; /* Azul escuro do seu cabeçalho */
            z-index: 1;
        }

        /* 3. IFRAME COLADO NO CHÃO */
        iframe {
            position: absolute;
            width: 100vw;
            border: none;
            
            /* Inicia logo abaixo da faixa escura do relógio */
            top: env(safe-area-inset-top);
            
            /* O pulo do gato: em vez de calcular a altura, colamos a base no fundo da tela (0) */
            bottom: 0;
            left: 0;
            
            z-index: 2;
            background-color: transparent;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>
</body>
</html>
