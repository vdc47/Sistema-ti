<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sistema ATI</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/vdc47/Sistema-ti/refs/heads/main/efadbb17-63fc-4712-b9b0-338b1955846c-wm.ico">

    <style>
        /* RESET E BLOQUEIO DO EFEITO ELÁSTICO (RUBBER-BAND) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            
            /* Cor escura igual ao cabeçalho mobile do seu app (#0f172a). 
               Isso faz a área do relógio/ilha dinâmica ficar da mesma cor do cabeçalho */
            background-color: #f8fafc; 
            
            overflow: hidden;
            overscroll-behavior: none; /* Mata o efeito elástico nativo do iOS */
            position: fixed; /* Trava o fundo completamente, impedindo qualquer arraste da janela */
        }

        iframe {
            position: absolute;
            width: 100%;
            border: none;
            
            /* Começa exatamente DEPOIS da Ilha Dinâmica / Relógio */
            top: env(safe-area-inset-top);
            
            /* A altura é 100dvh MENOS a ilha dinâmica (topo) e MENOS a barrinha de home (baixo). 
               Isso resolve a barra branca sobrando e encaixa o app no milímetro */
            height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            
            margin-top: 0px; 
            
            /* Garante que o fundo do iframe em si tenha a cor clara do sistema */
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxkD8vzWeBq-mx00s_QP4jh_570VBDOjsTN09jK4sQcZrhKzubiDmH88zhw7mOhpon4hA/exec" allowfullscreen></iframe>

</body>
</html>
